name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "22"
  WAILS_VERSION: "v2.13.0"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Install NSIS
        run: |
          choco install nsis -y
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify makensis is on PATH
        run: makensis /VERSION

      - name: Set version
        run: |
          $version = "${env:GITHUB_REF_NAME}" -replace '^v',''
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Build
        run: wails build -platform windows/amd64 -nsis

      - name: Package artifacts
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "build\bin\mqtt-access.exe" "dist\mqtt-access-$env:VERSION-windows-amd64.exe"
          Copy-Item "build\bin\MQTT Access-$env:VERSION-amd64-installer.exe" "dist\mqtt-access-$env:VERSION-windows-amd64-setup.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: dist/*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build
        run: wails build -platform darwin/universal

      - name: Package artifacts
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "build/bin/MQTT Access.app" "dist/mqtt-access-${VERSION}-macos-universal.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: dist-macos
          path: dist/*

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev build-essential pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build
        run: wails build -platform linux/amd64

      - name: Package artifacts
        run: |
          mkdir -p dist
          tar -C build/bin -czf "dist/mqtt-access-${VERSION}-linux-amd64.tar.gz" mqtt-access

      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: dist/*

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
